{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}ThreadForge{{end}}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="brand-icon">⬡</span>
            ThreadForge
        </a>
        <div class="nav-links">
            <a href="/" class="nav-link {{if eq .Page "home"}}active{{end}}">Discussions</a>
            <a href="/categories" class="nav-link {{if eq .Page "categories"}}active{{end}}">Categories</a>
        </div>
        <div class="nav-actions">
            {{if .User}}
                <span class="nav-username">{{.User.Username}}</span>
                <a href="/new-post" class="btn-primary">New Post</a>
                <a href="/logout" class="btn-ghost">Logout</a>
            {{else}}
                <a href="/login" class="btn-ghost">Sign In</a>
                <a href="/register" class="btn-primary">Join</a>
            {{end}}
        </div>
    </nav>

    <main class="main-content">
        {{block "content" .}}{{end}}
    </main>

    <footer class="footer">
        <div class="footer-inner">
            <span class="footer-brand">⬡ ThreadForge</span>
            <div class="footer-links">
                <a href="#">Guidelines</a>
                <a href="#">Privacy</a>
                <a href="#">Contact</a>
            </div>
            <span class="footer-copy">© 2024 ThreadForge</span>
        </div>
    </footer>

</body>
</html>
{{end}}
