{{define "navbar"}}
<header class="navbar">
  <div class="navbar-inner">
    <h1 class="navbar-brand">The Scholarly Forum</h1>

    <nav class="navbar-nav">
      <a href="/" class="active">Home</a>

      {{if .User}}
        <span class="welcome-text"><strong>{{.User.Username}}</strong></span>
        <a href="/logout">Logout</a>
      {{else}}
        <a href="/login">Login</a>
        <a href="/register">Register</a>
      {{end}}
    </nav>
  </div>
</header>
{{end}}
