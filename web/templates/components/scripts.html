{{define "scripts"}}
<script>
// ================================
// Category Loading
// ================================
async function loadCategories() {
  try {
    const res = await fetch("/categories");
    const categories = await res.json();

    const list = document.getElementById("categoryList");
    const formCategories = document.getElementById("createPostCategories");

    categories.forEach(cat => {
      if (list) {
        const li = document.createElement("li");
        li.innerHTML = `
          <button onclick="loadPosts({ category: '${cat.Name}' })">
            # ${cat.Name}
          </button>
        `;
        list.appendChild(li);
      }

      if (formCategories) {
        const label = document.createElement("label");
        label.className = "checkbox-label";
        label.innerHTML = `
          <input type="checkbox" name="categories" value="${cat.Name}">
          <span>${cat.Name}</span>
        `;
        formCategories.appendChild(label);
      }
    });
  } catch (err) {
    console.error("Failed to load categories:", err);
  }
}

// ================================
// Post Loading
// ================================
async function loadPosts(filter = {}) {
  const feed = document.getElementById("postFeed");
  feed.innerHTML = '<div class="empty-state">Loading posts...</div>';

  try {
    const params = new URLSearchParams();
    if (filter.category) params.append("category", filter.category);
    if (filter.user) params.append("user", filter.user);
    if (filter.liked) params.append("liked", "true");

    const res = await fetch("/posts" + (params.toString() ? `?${params}` : ""));
    const posts = await res.json();

    if (!posts || posts.length === 0) {
      feed.innerHTML = '<div class="card empty-state">No posts found.</div>';
      return;
    }

    feed.innerHTML = "";

    posts.forEach(post => {
      const article = document.createElement("article");
      article.className = "post-card";
      article.tabIndex = 0;
      article.style.cursor = "pointer";

      const categoriesHtml = post.Category
        ? post.Category.map(c => `<span class="post-tag">#${c.Name}</span>`).join(" ")
        : "";

      article.innerHTML = `
        <div class="post-tags">${categoriesHtml}</div>
        <h3 class="post-title">${post.Title}</h3>
        <p class="post-content">${post.Content}</p>

        <div class="post-meta">
          <span>
            By ${post.Username || "Anonymous"} •
            ${new Date(post.CreatedAt).toLocaleDateString()}
          </span>

          <div class="post-actions">
            <form class="reaction-form" action="/react" method="POST">
              <input type="hidden" name="post_id" value="${post.ID}">
              <input type="hidden" name="type" value="like">
              <button type="submit">👍 ${post.Likes || 0}</button>
            </form>

            <form class="reaction-form" action="/react" method="POST">
              <input type="hidden" name="post_id" value="${post.ID}">
              <input type="hidden" name="type" value="dislike">
              <button type="submit">👎 ${post.Dislikes || 0}</button>
            </form>

            <span class="post-comments-link">💬</span>
          </div>
        </div>
      `;

      // ---- Navigation ----
      article.addEventListener("click", () => {
        window.location.href = `/posts/${post.ID}`;
      });

      article.addEventListener("keydown", e => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          window.location.href = `/posts/${post.ID}`;
        }
      });

      // ---- Prevent reaction clicks from navigating ----
      article.querySelectorAll(".reaction-form, .reaction-form button").forEach(el => {
        el.addEventListener("click", e => e.stopPropagation());
      });

      // ---- Comments link ----
      const commentsLink = article.querySelector(".post-comments-link");
      commentsLink.addEventListener("click", e => {
        e.stopPropagation();
        window.location.href = `/posts/${post.ID}#f-comments`;
      });

      feed.appendChild(article);
    });
  } catch (err) {
    console.error(err);
    feed.innerHTML = '<div class="card empty-state" style="color:red">Failed to load posts.</div>';
  }
}

// ================================
// Reaction Handler (NO REDIRECT)
// ================================
document.addEventListener("submit", async e => {
  const form = e.target;

  if (!form.classList.contains("reaction-form")) return;

  e.preventDefault();
  e.stopPropagation();

  try {
    const res = await fetch(form.action, {
      method: "POST",
      body: new FormData(form),
      credentials: "same-origin"
    });

    if (res.status === 401) {
      alert("You must be logged in to react.");
      return;
    }

    if (!res.ok) {
      alert("Failed to react.");
      return;
    }

    loadPosts(); // refresh counts
  } catch (err) {
    console.error(err);
    alert("Network error.");
  }
});

// ================================
// Create Post
// ================================
const postForm = document.getElementById("postForm");

if (postForm) {
  postForm.addEventListener("submit", async e => {
    e.preventDefault();

    const categories = [...document.querySelectorAll('input[name="categories"]:checked')]
      .map(cb => cb.parentElement.innerText.trim());

    const postData = {
      Title: document.getElementById("title").value,
      Content: document.getElementById("content").value,
      category: categories
    };

    try {
      const res = await fetch("/posts", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(postData)
      });

      if (!res.ok) throw new Error();

      alert("Post created successfully!");
      postForm.reset();
      loadPosts();
    } catch {
      alert("You must be logged in to create a post.");
    }
  });
}

// ================================
// Initial Load
// ================================
window.onload = () => {
  loadCategories();
  loadPosts();
};
</script>
{{end}}
